baseurl:
remote_theme: chrisbobbe/jekyll-theme-prologue 

collections:
    authors:
     output: true
     
defaults:
  - scope:
      path: ""
      type: "authors"
    values:
      layout: "author"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

